<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">AI 生图应用 — 系统架构图</text>
  <rect x="40" y="60" width="880" height="90" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="56" y="80" font-size="12" fill="#6b7280">客户端</text>
  <rect x="80" y="90" width="160" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="117" text-anchor="middle" font-size="13" fill="#111827">前台用户界面</text>
  <rect x="300" y="90" width="160" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="117" text-anchor="middle" font-size="13" fill="#111827">管理后台界面</text>
  <rect x="40" y="180" width="880" height="90" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="56" y="200" font-size="12" fill="#6b7280">API 层</text>
  <rect x="80" y="210" width="180" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="237" text-anchor="middle" font-size="13" fill="#111827">/api/auth (认证)</text>
  <rect x="300" y="210" width="180" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="237" text-anchor="middle" font-size="13" fill="#111827">/api/generate (生图)</text>
  <rect x="520" y="210" width="180" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="237" text-anchor="middle" font-size="13" fill="#111827">/api/admin (管理)</text>
  <rect x="40" y="300" width="880" height="90" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="56" y="320" font-size="12" fill="#6b7280">服务层</text>
  <rect x="80" y="330" width="160" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="357" text-anchor="middle" font-size="13" fill="#111827">积分系统</text>
  <rect x="300" y="330" width="160" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="357" text-anchor="middle" font-size="13" fill="#111827">作品管理</text>
  <rect x="520" y="330" width="160" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="357" text-anchor="middle" font-size="13" fill="#111827">用户管理</text>
  <rect x="40" y="420" width="880" height="90" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="56" y="440" font-size="12" fill="#6b7280">AI 模型 API</text>
  <rect x="120" y="450" width="200" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="477" text-anchor="middle" font-size="13" fill="#111827">Agnes AI (2.0/2.1)</text>
  <rect x="420" y="450" width="200" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="477" text-anchor="middle" font-size="13" fill="#111827">Sensenova (u1-fast)</text>
  <rect x="40" y="540" width="880" height="90" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="56" y="560" font-size="12" fill="#6b7280">数据存储</text>
  <rect x="120" y="570" width="200" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="597" text-anchor="middle" font-size="13" fill="#111827">Supabase PostgreSQL</text>
  <rect x="420" y="570" width="200" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="597" text-anchor="middle" font-size="13" fill="#111827">Supabase Storage</text>
  <line x1="160" y1="134" x2="160" y2="210" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="380" y1="134" x2="380" y2="210" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="380" y1="134" x2="610" y2="210" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="160" y1="254" x2="160" y2="330" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="390" y1="254" x2="380" y2="330" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="610" y1="254" x2="600" y2="330" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="380" y1="374" x2="220" y2="450" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="380" y1="374" x2="520" y2="450" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="160" y1="374" x2="220" y2="570" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="600" y1="374" x2="520" y2="570" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <g transform="translate(700, 640)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="36" y="12" fill="#6b7280" font-size="11">数据流</text>
    <line x1="100" y1="8" x2="130" y2="8" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="136" y="12" fill="#6b7280" font-size="11">业务流</text>
    <line x1="200" y1="8" x2="230" y2="8" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <text x="236" y="12" fill="#6b7280" font-size="11">外部 API</text>
  </g>
</svg>